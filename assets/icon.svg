<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="80" fill="#2c2c2e"/>
  
  <!-- 4×3 Button-Grid (4 rows, 3 columns) -->
  
  <!-- Row 1 (top) -->
  <circle cx="140" cy="120" r="42" fill="#F0ECE7" opacity="0.95"/>
  <circle cx="256" cy="120" r="42" fill="#F0ECE7" opacity="0.95"/>
  <circle cx="372" cy="120" r="44" fill="#6464FF"/> <!-- BLUE -->
  
  <!-- Row 2 -->
  <circle cx="140" cy="210" r="42" fill="#F0ECE7" opacity="0.95"/>
  <circle cx="256" cy="210" r="44" fill="#6464FF"/> <!-- BLUE -->
  <circle cx="372" cy="210" r="42" fill="#F0ECE7" opacity="0.95"/>
  
  <!-- Row 3 -->
  <circle cx="140" cy="300" r="42" fill="#F0ECE7" opacity="0.95"/>
  <circle cx="256" cy="300" r="42" fill="#F0ECE7" opacity="0.95"/>
  <circle cx="372" cy="300" r="42" fill="#F0ECE7" opacity="0.95"/>
  
  <!-- Row 4 (bottom) -->
  <circle cx="140" cy="390" r="42" fill="#F0ECE7" opacity="0.95"/>
  <circle cx="256" cy="390" r="42" fill="#F0ECE7" opacity="0.95"/>
  <circle cx="372" cy="390" r="44" fill="#6464FF"/> <!-- BLUE -->
  
  <!-- Highlights on pearl buttons (subtle) -->
  <circle cx="140" cy="110" r="12" fill="white" opacity="0.3"/>
  <circle cx="256" cy="110" r="12" fill="white" opacity="0.3"/>
  <circle cx="140" cy="200" r="12" fill="white" opacity="0.3"/>
  <circle cx="372" cy="200" r="12" fill="white" opacity="0.3"/>
  <circle cx="140" cy="290" r="12" fill="white" opacity="0.3"/>
  <circle cx="256" cy="290" r="12" fill="white" opacity="0.3"/>
  <circle cx="372" cy="290" r="12" fill="white" opacity="0.3"/>
  <circle cx="140" cy="380" r="12" fill="white" opacity="0.3"/>
  <circle cx="256" cy="380" r="12" fill="white" opacity="0.3"/>
  
  <!-- Highlights on blue buttons -->
  <circle cx="372" cy="108" r="12" fill="white" opacity="0.35"/>
  <circle cx="256" cy="198" r="12" fill="white" opacity="0.35"/>
  <circle cx="372" cy="378" r="12" fill="white" opacity="0.35"/>
</svg>
